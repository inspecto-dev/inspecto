name: AI Target Integration Request
description: Request a new AI tool integration for Inspecto
title: '[AI Target]: '
labels: ['enhancement', 'ai-target']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in adding a new AI Target to Inspecto!
  - type: input
    id: ai_target_name
    attributes:
      label: AI Target Name
      description: The name of the AI tool or platform you want to integrate (e.g., Cursor, GitHub Copilot, Claude Code).
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: How would you use this AI target with Inspecto? What problems does it solve for you?
    validations:
      required: true
  - type: textarea
    id: documentation
    attributes:
      label: API / Integration Documentation
      description: If possible, provide links to the AI tool's API documentation, CLI usage, or any relevant integration guides.
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the integration request here.
